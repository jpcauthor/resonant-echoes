<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resonant Echoes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;500&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:      #1a1208;
      --gold:     #c9973a;
      --gold-dim: #8a6422;
      --parchment:#f5ecd7;
    }

    html, body {
      height: 100%;
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'EB Garamond', serif;
      color: var(--parchment);
    }

    /* starfield behind everything, pointer-events off */
    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* vignette */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 20%, rgba(10,6,2,0.9) 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* ember glow */
    .glow {
      position: fixed;
      bottom: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 200px;
      background: radial-gradient(ellipse, rgba(180,70,20,0.2) 0%, transparent 70%);
      z-index: 1;
      pointer-events: none;
      animation: breathe 6s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1.0; }
    }

    /* hint text */
    .hint {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold-dim);
      animation: pulse 3s ease-in-out infinite;
      white-space: nowrap;
      pointer-events: none;
      transition: opacity 0.5s;
    }
    .hint.hidden { opacity: 0; }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1;   }
    }

    /* scene — sits above everything, catches clicks */
    .scene {
      position: relative;
      z-index: 5;
      perspective: 2000px;
      cursor: pointer;
    }

    .book {
      position: relative;
      width: min(340px, 75vw);
      height: min(510px, 82vh);
      transform-style: preserve-3d;
      transition: transform 0.3s ease, filter 0.3s ease;
      filter: drop-shadow(0 30px 60px rgba(0,0,0,0.8));
    }

    .scene:hover .book {
      transform: scale(1.02) translateY(-6px);
      filter: drop-shadow(0 40px 80px rgba(0,0,0,0.9))
              drop-shadow(0 0 40px rgba(201,151,58,0.15));
    }

    /* page beneath — shows when cover flips */
    .page-beneath {
      position: absolute;
      inset: 0;
      border-radius: 2px 8px 8px 2px;
      background: #f0e6ce;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem;
      opacity: 0;
      transition: opacity 0.4s ease 1s;
    }

    .page-beneath .toc-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.1rem;
      color: #3a2a0a;
      letter-spacing: 0.1em;
      text-align: center;
    }

    .page-beneath .toc-rule {
      width: 80%;
      height: 1px;
      background: linear-gradient(to right, transparent, #8a6422, transparent);
    }

    .page-beneath .toc-hint {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: #6b4f1a;
      text-align: center;
    }

    /* spine */
    .spine {
      position: absolute;
      left: -14px;
      top: 0;
      width: 14px;
      height: 100%;
      background: linear-gradient(to right, #0d0a05, #2a1f0a, #1a1208);
      border-radius: 4px 0 0 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .spine-text {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      color: var(--gold-dim);
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* front cover — the flipping part */
    .cover-front {
      position: absolute;
      inset: 0;
      border-radius: 2px 8px 8px 2px;
      overflow: hidden;
      transform-origin: left center;
      transform-style: preserve-3d;
      transition: transform 1.4s cubic-bezier(0.645, 0.045, 0.355, 1.000);
      backface-visibility: hidden;
    }

    .cover-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    /* gold border on cover */
    .cover-front .frame {
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(201,151,58,0.3);
      border-radius: 1px;
      pointer-events: none;
      z-index: 2;
    }

    /* spine shadow on cover */
    .cover-front .shadow {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(0,0,0,0.4) 0%, transparent 8%, transparent 92%, rgba(0,0,0,0.2) 100%);
      pointer-events: none;
      z-index: 3;
    }

    /* flip state */
    .scene.flipped .cover-front {
      transform: rotateY(-180deg);
    }

    .scene.flipped .page-beneath {
      opacity: 1;
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="vignette"></div>
<div class="glow"></div>
<p class="hint" id="hint">&#10022; Open the book &#10022;</p>

<div class="scene" id="scene">
  <div class="book">

    <!-- page visible underneath when cover flips -->
    <div class="page-beneath">
      <p class="toc-title">Resonant Echoes</p>
      <div class="toc-rule"></div>
      <p class="toc-hint">Turning the page…</p>
    </div>

    <!-- spine -->
    <div class="spine">
      <span class="spine-text">Resonant Echoes</span>
    </div>

    <!-- flipping cover -->
    <div class="cover-front" id="cover">
      <img src="../images/cover.png" alt="Resonant Echoes">
      <div class="frame"></div>
      <div class="shadow"></div>
    </div>

  </div>
</div>

<script>
  const scene    = document.getElementById('scene');
  const hint     = document.getElementById('hint');
  let flipped    = false;
  let navigating = false;

  scene.addEventListener('click', () => {
    if (navigating) return;
    if (!flipped) {
      flipped = true;
      scene.classList.add('flipped');
      hint.classList.add('hidden');
      navigating = true;
      setTimeout(() => {
        window.location.href = 'toc.html';
      }, 1800);
    }
  });

  // starfield
  const canvas = document.getElementById('stars');
  const ctx    = canvas.getContext('2d');
  let W, H, stars = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initStars(n = 200) {
    stars = Array.from({ length: n }, () => ({
      x:  Math.random() * W,
      y:  Math.random() * H,
      r:  Math.random() * 1.2 + 0.2,
      a:  Math.random(),
      da: (Math.random() - 0.5) * 0.004
    }));
  }

  function drawStars() {
    ctx.clearRect(0, 0, W, H);
    for (const s of stars) {
      s.a += s.da;
      if (s.a < 0.05 || s.a > 1) s.da *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(245,236,215,${s.a.toFixed(2)})`;
      ctx.fill();
    }
    requestAnimationFrame(drawStars);
  }

  window.addEventListener('resize', () => { resize(); initStars(); });
  resize(); initStars(); drawStars();
</script>
</body>
</html>
